<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft de Novatos 2026 — Tercera Ronda | Liga Fantasy TVC Deportes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #E8C44A;
    --gold-dim: #b09636;
    --red: #C0392B;
    --dark: #0D0D0D;
    --dark2: #161616;
    --dark3: #1F1F1F;
    --card: #242424;
    --border: #2e2e2e;
    --text: #E8E8E8;
    --muted: #888;
    --green: #27AE60;
    --blue: #2980B9;
    --orange: #E67E22;
    --purple: #8E44AD;
    --teal: #1ABC9C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    padding-bottom: 60px;
  }

  .header-bg {
    background: linear-gradient(135deg, #050505 0%, #161616 100%);
    border-bottom: 3px solid var(--gold);
    padding: 40px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header-bg::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 3px;
    background: var(--gold);
    box-shadow: 0 0 15px var(--gold);
  }

  .logo-container {
    margin-bottom: 15px;
  }

  .logo-img {
    max-height: 100px;
    width: auto;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    color: var(--gold);
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 5px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }

  .subtitle {
    font-size: 1.1rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 400;
  }

  .container {
    max-width: 1000px;
    margin: 30px auto;
    padding: 0 20px;
  }

  .nav-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    overflow-x: auto;
  }

  .nav-tab {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    padding: 8px 18px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--dark2);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav-tab:hover {
    color: var(--gold);
    border-color: var(--gold);
  }

  .nav-tab.active {
    color: var(--dark);
    background: var(--gold);
    border-color: var(--gold);
  }

  .grid-main {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 25px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    margin-bottom: 25px;
  }

  h2.section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 20px;
    border-left: 4px solid var(--gold);
    padding-left: 12px;
    letter-spacing: 1px;
  }

  .intro-text {
    font-size: 1.1rem;
    color: #f0f0f0;
    margin-bottom: 20px;
  }

  .tvc-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 0.95rem;
  }

  .tvc-table th {
    background: var(--dark3);
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 1px;
    padding: 12px;
    text-align: left;
    border-bottom: 2px solid var(--border);
  }

  .tvc-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .tvc-table tbody tr:hover {
    background: rgba(232, 196, 74, 0.02);
  }

  .pick-badge {
    font-family: 'Bebas Neue', sans-serif;
    background
